<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cæcilie Balling</title>
    <meta name="description" content="Cæcilie Balling — violinist and artist. New website coming soon." />
    <meta name="theme-color" content="#ee241f" />

    <meta property="og:title" content="Cæcilie Balling" />
    <meta property="og:description" content="Violinist and artist. New website coming soon." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.caecilieballing.com/" />
    <meta property="og:image" content="https://www.caecilieballing.com/caecilie-balling-violin.webp" />
    <link rel="canonical" href="https://www.caecilieballing.com/" />
    <link rel="preload" href="caecilie-balling-violin.webp" as="image" type="image/webp" />

    <style>
      :root {
        color-scheme: dark;
        --white: #fffaf4;
        --shadow: rgba(20, 0, 0, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #d91f1b;
        color: var(--white);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        isolation: isolate;
      }

      .portrait {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 43%;
      }

      main::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.32) 0%, transparent 28%),
          linear-gradient(0deg, rgba(0, 0, 0, 0.26) 0%, transparent 30%);
      }

      h1,
      p {
        position: absolute;
        margin: 0;
        text-transform: uppercase;
        text-shadow: 0 1px 12px var(--shadow);
      }

      h1 {
        top: clamp(18px, 3vw, 44px);
        left: clamp(18px, 3vw, 44px);
        font-size: clamp(2.15rem, 7.4vw, 8.75rem);
        font-weight: 500;
        line-height: 0.82;
        letter-spacing: -0.065em;
      }

      h1 span {
        display: block;
      }

      p {
        right: clamp(18px, 3vw, 44px);
        bottom: clamp(18px, 3vw, 38px);
        max-width: 13em;
        font-size: clamp(0.78rem, 1.3vw, 1.15rem);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0.12em;
        text-align: right;
      }

      .contact {
        position: absolute;
        left: 50%;
        bottom: clamp(18px, 3vw, 38px);
        transform: translateX(-50%);
        color: inherit;
        white-space: nowrap;
        font-size: clamp(0.78rem, 1.3vw, 1.15rem);
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: lowercase;
        text-decoration-color: currentColor;
        text-underline-offset: 0.2em;
        text-shadow: 0 1px 12px var(--shadow);
      }

      @media (max-width: 640px) {
        .portrait {
          object-position: 55% 50%;
        }

        main::after {
          background:
            linear-gradient(180deg, rgba(0, 0, 0, 0.38) 0%, transparent 26%),
            linear-gradient(0deg, rgba(0, 0, 0, 0.42) 0%, transparent 34%);
        }

        h1 {
          top: max(18px, env(safe-area-inset-top));
          left: max(18px, env(safe-area-inset-left));
          font-size: clamp(2.35rem, 14vw, 4.8rem);
          line-height: 0.84;
          letter-spacing: -0.055em;
        }

        p {
          right: max(18px, env(safe-area-inset-right));
          bottom: max(76px, calc(env(safe-area-inset-bottom) + 72px));
          max-width: 9em;
          font-size: clamp(0.7rem, 3.1vw, 0.86rem);
          line-height: 1.12;
          letter-spacing: 0.11em;
        }

        .contact {
          bottom: max(18px, env(safe-area-inset-bottom));
          width: max-content;
          max-width: calc(100vw - 32px);
          overflow: hidden;
          font-size: clamp(0.72rem, 3.4vw, 0.9rem);
          letter-spacing: 0.07em;
          text-align: center;
          text-overflow: ellipsis;
        }
      }

      @media (max-height: 500px) and (orientation: landscape) {
        .portrait {
          object-position: 50% 42%;
        }

        h1 {
          top: 16px;
          left: 16px;
          font-size: clamp(2rem, 9vw, 4rem);
        }

        p {
          right: 16px;
          bottom: 54px;
          font-size: 0.72rem;
        }

        .contact {
          bottom: 16px;
          font-size: 0.75rem;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .portrait {
          animation: arrive 1.2s ease-out both;
        }

        h1,
        p {
          animation: reveal 0.8s 0.25s ease-out both;
        }

        p {
          animation-delay: 0.4s;
        }

        @keyframes arrive {
          from {
            opacity: 0;
            transform: scale(1.025);
          }
          to {
            opacity: 1;
            transform: scale(1);
          }
        }

        @keyframes reveal {
          from {
            opacity: 0;
            transform: translateY(10px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img
        class="portrait"
        src="caecilie-balling-violin.webp"
        alt="Cæcilie Balling with her violin"
        width="2400"
        height="2430"
      />
      <h1><span>Cæcilie</span><span>Balling</span></h1>
      <p>New website<br />coming soon</p>
      <a class="contact" href="mailto:mail@caecilieballing.com">mail@caecilieballing.com</a>
    </main>
  </body>
</html>
