<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cæcilie Balling</title>
    <meta name="description" content="Cæcilie Balling — violinist og kunstner." />
    <meta name="theme-color" content="#f4f1ea" />

    <meta property="og:title" content="Cæcilie Balling" />
    <meta property="og:description" content="Cæcilie Balling — violinist og kunstner." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://caecilieballing.com/" />

    <style>
      :root {
        color-scheme: light;
        --paper: #f4f1ea;
        --ink: #171717;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 9vw, 8rem);
        font-weight: 400;
        line-height: 0.9;
        letter-spacing: -0.055em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cæcilie Balling</h1>
    </main>
  </body>
</html>
